<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>ArGram 2.0 Web</title>
  <style>
    :root{
      --acc:#0a84ff;
      --acc2:#6ea8fe;
      --glass:rgba(255,255,255,0.58);
      --glass2:rgba(255,255,255,0.36);
      --text:#0f172a;
      --muted:#667085;
      --line:rgba(255,255,255,0.55);
      --shadow:0 18px 45px rgba(15, 23, 42, 0.10);
      --warn:#ff3b30;
    }*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family:"Segoe UI", system-ui, -apple-system, sans-serif;
}

html,body{
  margin:0;
  height:100%;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 35%),
    radial-gradient(circle at bottom right, rgba(139,184,255,0.22), transparent 32%),
    linear-gradient(180deg, #eef3fb 0%, #e7edf8 100%);
  color:var(--text);
  overflow:hidden;
}

.glass{
  background:var(--glass);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}

#app{
  height:100%;
  display:flex;
  flex-direction:column;
}

.topbar{
  margin:12px 12px 8px;
  border-radius:24px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand{
  font-size:18px;
  font-weight:800;
  letter-spacing:0.2px;
}

.brand small{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  margin-top:2px;
}

.status-dot{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  white-space:nowrap;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#16a34a;
  box-shadow:0 0 0 4px rgba(22,163,74,.12);
}

.dot.offline{
  background:#f59e0b;
  box-shadow:0 0 0 4px rgba(245,158,11,.12);
}

.pills{
  display:flex;
  gap:10px;
  padding:0 12px 10px;
}

.pill{
  flex:1;
  border:none;
  border-radius:18px;
  padding:13px 14px;
  background:var(--glass2);
  color:#334155;
  font-weight:700;
  cursor:pointer;
  transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
  box-shadow:0 8px 20px rgba(15, 23, 42, 0.06);
  position:relative;
}

.pill:hover{ transform:translateY(-1px); }
.pill:active{ transform:scale(0.98); }
.pill.active{
  background:linear-gradient(135deg, var(--acc), var(--acc2));
  color:white;
  box-shadow:0 12px 28px rgba(10,132,255,0.25);
}

.badge{
  position:absolute;
  top:-6px;
  right:-6px;
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  background:var(--warn);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #fff;
  font-size:10px;
  font-weight:800;
  animation:pulse 1.25s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.12); }
  100%{ transform:scale(1); }
}

.chatbar{
  margin:0 12px 8px;
  border-radius:22px;
  padding:12px 14px;
  display:none;
  align-items:center;
  gap:10px;
}

.flow{
  flex:1;
  overflow-y:auto;
  padding:8px 12px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}

.msg-row{
  display:flex;
  align-items:flex-end;
  gap:9px;
  animation:slideUp .22s ease both;
}

.msg-row.me{ flex-direction:row-reverse; }

@keyframes slideUp{
  from{ opacity:0; transform:translateY(10px) scale(.98); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}

.ava{
  width:36px;
  height:36px;
  border-radius:50%;
  object-fit:cover;
  flex:0 0 auto;
  border:1px solid rgba(255,255,255,0.85);
  box-shadow:0 8px 18px rgba(15,23,42,.12);
  background:#dbe4f0;
}

.ava-fallback{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  color:#35506d;
  background:linear-gradient(135deg, #dfe7f3, #f8fbff);
}

.bubble{
  max-width:min(78%, 620px);
  padding:11px 14px;
  border-radius:18px;
  background:rgba(255,255,255,0.86);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 10px 24px rgba(15,23,42,0.08);
  word-break:break-word;
  cursor:pointer;
  transition:transform .18s ease, opacity .18s ease, box-shadow .18s ease;
  position:relative;
  overflow:hidden;
  white-space:pre-wrap;
}

.bubble:hover{
  transform:translateY(-1px);
  box-shadow:0 14px 28px rgba(15,23,42,0.11);
}

.bubble:active{
  transform:scale(0.985);
  opacity:0.92;
}

.me .bubble{
  background:linear-gradient(135deg, var(--acc), var(--acc2));
  color:white;
  border:1px solid rgba(255,255,255,0.18);
}

.bubble b{
  display:block;
  font-size:10px;
  letter-spacing:.6px;
  text-transform:uppercase;
  opacity:.62;
  margin-bottom:3px;
}

.bubble img{
  width:100%;
  display:block;
  border-radius:12px;
  margin-top:6px;
}

.footer{
  margin:0 12px 12px;
  border-radius:24px;
  padding:10px;
  display:flex;
  gap:8px;
  align-items:center;
}

.i-wrap{
  flex:1;
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.76);
  border:1px solid rgba(255,255,255,0.75);
  border-radius:18px;
  padding:0 4px;
}

.i-wrap input{
  width:100%;
  border:none;
  background:transparent;
  outline:none;
  padding:13px 12px;
  font-size:16px;
  color:var(--text);
}

.btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:rgba(255,255,255,0.62);
  color:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 22px rgba(15,23,42,.10);
  border:1px solid rgba(255,255,255,0.72);
  transition:transform .18s ease, opacity .18s ease, background .18s ease;
  flex:0 0 auto;
  overflow:hidden;
  position:relative;
}

.btn:hover{ transform:translateY(-1px); background:rgba(255,255,255,0.78); }
.btn:active{ transform:scale(.92); }

.btn.send{
  background:linear-gradient(135deg, var(--acc), var(--acc2));
  color:#fff;
  width:auto;
  min-width:44px;
  padding:0 14px;
  border-radius:16px;
  font-weight:800;
}

#auth{
  position:fixed;
  inset:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.95), transparent 30%),
    linear-gradient(180deg, #edf3fb, #e8eef8);
}

.auth-card{
  width:min(92vw, 420px);
  border-radius:28px;
  padding:22px;
  text-align:center;
}

.auth-title{
  font-size:28px;
  font-weight:900;
  letter-spacing:.2px;
  margin-bottom:6px;
}

.auth-sub{
  color:var(--muted);
  font-size:13px;
  margin-bottom:18px;
}

.auth-field{
  width:100%;
  border:none;
  outline:none;
  padding:15px 16px;
  border-radius:18px;
  background:rgba(255,255,255,0.82);
  border:1px solid rgba(255,255,255,0.8);
  margin-bottom:10px;
  font-size:16px;
  box-shadow:0 10px 22px rgba(15,23,42,.06);
}

.ava-box{
  width:86px;
  height:86px;
  margin:0 auto 10px;
  border-radius:50%;
  overflow:hidden;
  background:linear-gradient(135deg, #dfe7f3, #f8fbff);
  border:2px solid rgba(10,132,255,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 14px 30px rgba(15,23,42,.10);
}

#adm{
  position:fixed;
  inset:0;
  z-index:2000;
  display:none;
  background:rgba(14, 20, 34, 0.42);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:16px;
}

.adm-panel{
  width:min(100%, 980px);
  height:100%;
  margin:0 auto;
  border-radius:28px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,0.62);
  border:1px solid rgba(255,255,255,0.72);
  box-shadow:0 20px 55px rgba(0,0,0,0.18);
}

.adm-head{
  padding:18px 18px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.55);
}

.adm-head h3{ margin:0; font-size:18px; }

.adm-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.adm-btn{
  border:none;
  border-radius:16px;
  padding:12px 14px;
  font-weight:800;
  cursor:pointer;
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:0 10px 20px rgba(15,23,42,.08);
  transition:transform .18s ease, background .18s ease;
}

.adm-btn:hover{ transform:translateY(-1px); background:rgba(255,255,255,0.92); }
.adm-btn:active{ transform:scale(.98); }

.adm-btn.danger{
  background:rgba(255,59,48,.12);
  color:#b42318;
}

.adm-grid{
  flex:1;
  display:grid;
  grid-template-columns: 1.05fr .95fr;
  gap:12px;
  padding:12px;
  overflow:hidden;
}

.adm-card{
  border-radius:24px;
  padding:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:0;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.7);
}

.adm-card h4{
  margin:0 0 10px 0;
  font-size:15px;
}

.adm-list{
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-right:2px;
}

.adm-item{
  border-radius:18px;
  padding:10px 12px;
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(255,255,255,0.8);
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 8px 18px rgba(15,23,42,.06);
}

.adm-item .txt{ flex:1; min-width:0; }
.adm-item .txt b{ display:block; font-size:14px; margin-bottom:2px; }
.adm-item .txt span{ color:var(--muted); font-size:12px; }

.adm-mini{
  border:none;
  border-radius:14px;
  padding:9px 11px;
  font-weight:800;
  cursor:pointer;
  background:rgba(10,132,255,.10);
  color:#0b5dbb;
}

.adm-mini.red{
  background:rgba(255,59,48,.11);
  color:#b42318;
}

.adm-log{
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size:12px;
  line-height:1.4;
  white-space:normal;
}

.hidden{ opacity:0; pointer-events:none; transform:translateY(-20px); }

#ctx{
  position:fixed;
  inset:0;
  z-index:2500;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:20px;
}

.ctx-card{
  width:min(92vw, 320px);
  border-radius:24px;
  padding:16px;
  text-align:center;
}

.ctx-card h4{
  margin:0 0 14px 0;
  font-size:15px;
  word-break:break-word;
}

.ctx-btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:13px 14px;
  font-weight:800;
  margin-top:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.78);
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:0 10px 18px rgba(15,23,42,.08);
}

.ctx-btn.danger{
  background:rgba(255,59,48,.12);
  color:#b42318;
}

#banOverlay{
  position:fixed;
  inset:0;
  z-index:4000;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,.45);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:20px;
}

.ban-card{
  width:min(92vw, 360px);
  border-radius:24px;
  padding:20px;
  text-align:center;
  background:rgba(255,255,255,.72);
  box-shadow:0 20px 55px rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.8);
}

.ban-card h2{ margin:0 0 8px 0; font-size:22px; }
.ban-card p{ margin:0 0 16px 0; color:#667085; }

.notice{
  margin:0 12px 10px;
  padding:10px 14px;
  border-radius:18px;
  font-size:12px;
  color:#334155;
  display:none;
}

@media (max-width: 860px){
  .adm-grid{ grid-template-columns:1fr; }
  .bubble{ max-width:82%; }
}

    function localLoad(){
      try { return JSON.parse(localStorage.getItem(LOCAL_DB_KEY) || '{"users":{},"messages":{}}'); }
      catch { return { users: {}, messages: {} }; }
    }

    function localSave(db){ localStorage.setItem(LOCAL_DB_KEY, JSON.stringify(db)); }

    function localGetSnapshot(){
      const db = localLoad();
      const users = Object.values(db.users || {});
      const msgs = Object.values(db.messages || {}).sort((a,b) => (a.ts||0) - (b.ts||0));
      return { users, msgs };
    }

    function localUpsertUser(name, patch){
      const db = localLoad();
      db.users[name] = Object.assign({ n:name, p:'', b:false, a:'', lastSeen:0, typing:false, reads:{} }, db.users[name] || {}, patch || {});

      return db.users[name];
    }

    function localAddMessage(msg){
      const db = localLoad();
      db.messages[msg.id] = msg;
      const msgs = Object.values(db.messages).sort((a,b) => (a.ts||0) - (b.ts||0));

        const old = msgs.shift();
        delete db.messages[old.id];
      }
      localSave(db);
    }

    function localDeleteMessage(id){
      const db = localLoad();
      delete db.messages[id];
      localSave(db);

      const db = localLoad();
      if(db.messages[id]) db.messages[id].m = text;
      localSave(db);
    }

      const db = localLoad();
      if(!db.users[username]) return;
      db.users[username].b = !db.users[username].b;
      localSave(db);
    }

    function localClearChat(){
      const db = localLoad();

    function fileToDataURL(file, maxSide = 90, quality = 0.15){
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onerror = reject;
        r.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const ratio = Math.min(maxSide / img.width, maxSide / img.height, 1);
            const w = Math.max(1, Math.round(img.width * ratio));
            const h = Math.max(1, Math.round(img.height * ratio));
            const c = document.createElement('canvas');
            c.width = w;
            c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        r.readAsDataURL(file);
      });
    }

        fbApp = firebase.initializeApp(firebaseConfig);

    async function fbAuthLogin(name, pass, avatar){
      const userRef = firebase.database().ref('users/' + name);
      const snap = await userRef.once('value');
      if(!snap.exists()){
        await userRef.set({ n:name, p:pass, b:false, a:avatar || '', lastSeen: now(), typing:false, reads:{}, on:true });
        return 'REG';
      }
      const u = snap.val();
      if(u.b) return 'BAN';
      if((u.p || '') !== pass) return 'ERR';
      const patch = { lastSeen: now(), typing:false, on:true };
      if(avatar && avatar.length > 10) patch.a = avatar;
      await userRef.update(patch);
      return 'OK';
    }

    function fbStartPresence(){
      const userRef = firebase.database().ref('users/' + state.meName);
      const connectedRef = firebase.database().ref('.info/connected');
      connectedRef.on('value', (snap) => {
        if(snap.val() === true){
          userRef.onDisconnect().update({ on:false, typing:false, lastSeen: now() });
          userRef.update({ on:true, typing:false, lastSeen: now() });
        }
      });
    }

    function fbWatch(){
      if(state.fbWatchersReady) return;
      state.fbWatchersReady = true;

      firebase.database().ref('users').on('value', (snap) => {
        const users = [];
        snap.forEach(child => users.push(child.val()));
        state.lastSnapshot.users = users;
        const me = users.find(u => u.n === state.meName);
        state.lastRead = (me && me.reads) ? me.reads : {};
        render();
        if(state.adminOpen) renderAdmin();
      });

      firebase.database().ref('messages').orderByChild('ts').limitToLast(MAX_MESSAGES).on('value', (snap) => {
        const msgs = [];
        snap.forEach(child => msgs.push({ id: child.key, ...child.val() }));
        msgs.sort((a,b) => (a.ts||0) - (b.ts||0));
        state.lastSnapshot.msgs = msgs;

        const hasNewPriv = msgs.some(m => m.t === state.meName && m.f !== state.target && !(state.lastRead[m.f] || 0));
        $('p-warn').style.display = (hasNewPriv && state.room !== 'chat') ? 'flex' : 'none';

        render();
        if(state.adminOpen) renderAdmin();
      });
    }

    async function fbSendText(text){
      await firebase.database().ref('messages').push({ f: state.meName, t: state.room === 'chat' ? state.target : '', m: text, ts: now() });

    }

    async function fbSendImage(dataUrl){
      await firebase.database().ref('messages').push({ f: state.meName, t: state.room === 'chat' ? state.target : '', m: dataUrl, ts: now() });

    }

    async function pruneFirebaseMessages(){
      const snap = await firebase.database().ref('messages').orderByChild('ts').limitToLast(MAX_MESSAGES + 50).once('value');
      const arr = [];
      snap.forEach(child => arr.push({ key: child.key, ...child.val() }));
      arr.sort((a,b) => (a.ts||0) - (b.ts||0));
      while(arr.length > MAX_MESSAGES){
        const old = arr.shift();
        await firebase.database().ref('messages/' + old.key).remove();
      }
    }

        else result = localAuthLogin(name, pass, avatar);

        if(result === 'BAN'){ alert('Вы заблокированы'); return; }

          showNotice('Online mode активен: данные сохраняются в Firebase.');

          localStartPresence();
          localWatch();
          setInterval(() => { if(state.meName) localUpsertUser(state.meName, { lastSeen: now(), on:true }); }, 2500);
          showNotice('Offline mode: данные сохраняются только на этом устройстве.');

        else await localClearAllChat();

    async function refreshSnapshot(){
      if(isFirebaseOnline()){
        const [usersSnap, msgsSnap] = await Promise.all([
          firebase.database().ref('users').once('value'),
          firebase.database().ref('messages').orderByChild('ts').limitToLast(MAX_MESSAGES).once('value')
        ]);
        const users = [];
        usersSnap.forEach(child => users.push(child.val()));
        const msgs = [];
        msgsSnap.forEach(child => msgs.push({ id: child.key, ...child.val() }));
        msgs.sort((a,b) => (a.ts||0) - (b.ts||0));
        state.lastSnapshot = { users, msgs };
      } else {
        state.lastSnapshot = localGetSnapshot();
      }
      const me = state.lastSnapshot.users.find(u => u.n === state.meName);
      state.lastRead = (me && me.reads) ? me.reads : {};
      const hasNewPriv = state.lastSnapshot.msgs.some(m => m.t === state.meName && m.f === state.target && (m.ts || 0) > (state.lastRead[m.f] || 0));
      $('p-warn').style.display = (hasNewPriv && state.room !== 'chat') ? 'flex' : 'none';
      render();
      if(state.adminOpen) renderAdmin();
    }

    function attachLocalPolling(){
      clearInterval(state.localTimer);
      state.localTimer = setInterval(() => {
        if(!state.meName) return;
        state.lastSnapshot = localGetSnapshot();
        const me = state.lastSnapshot.users.find(u => u.n === state.meName);
        state.lastRead = (me && me.reads) ? me.reads : {};
        const hasNewPriv = state.lastSnapshot.msgs.some(m => m.t === state.meName && m.f === state.target && (m.ts || 0) > (state.lastRead[m.f] || 0));
        $('p-warn').style.display = (hasNewPriv && state.room !== 'chat') ? 'flex' : 'none';
        render();
        if(state.adminOpen) renderAdmin();
      }, 1000);
    }

    async function boot(){
      setNetUI(navigator.onLine);
      initFirebase();
      state.dbType = (navigator.onLine && firebaseOk) ? 'firebase' : 'local';

      const savedSession = (() => {
        try { return JSON.parse(localStorage.getItem(LOCAL_SESSION_KEY) || 'null'); } catch { return null; }
      })();
      if(savedSession && savedSession.name) $('un').value = savedSession.name;

      if(state.dbType === 'firebase') showNotice('Online mode активен: данные сохраняются в Firebase.');
      else showNotice('Offline mode: данные сохраняются только на этом устройстве.');

      window.addEventListener('online', async () => {
        setNetUI(true);
        if(firebaseOk){
          state.dbType = 'firebase';
          showNotice('Перешли в online mode: Firebase включён.');
          if(state.meName){
            attachFirebaseWatchers();
            await refreshSnapshot();
          }
        }
      });

      window.addEventListener('offline', () => {
        setNetUI(false);
        state.dbType = 'local';
        showNotice('Нет сети: включён offline mode на этом устройстве.');
        if(state.meName) attachLocalPolling();
      });

      $('mi').addEventListener('input', () => {
        if(state.room !== 'chat'){
          sendTyping(false);
          return;
        }
        clearTimeout(state.typingTimer);
        const hasText = $('mi').value.trim().length > 0;
        if(hasText){
          sendTyping(true);
          state.typingTimer = setTimeout(() => sendTyping(false), 1100);
        } else {
          sendTyping(false);
        }
      });

      $('mi').addEventListener('keydown', (e) => { if(e.key === 'Enter') sT(); });

      render();
      updateFooter();
    }

    window.addEventListener('beforeunload', () => {
      try {
        if(!state.meName) return;
        if(state.dbType === 'firebase' && firebaseOk){
          firebase.database().ref('users/' + state.meName).update({ on:false, typing:false, lastSeen: now() });
        } else {
          localUpsertUser(state.meName, { on:false, typing:false, lastSeen: now() });
        }
      } catch(e){}
    });

    boot();
  </script></body>
  </html>
